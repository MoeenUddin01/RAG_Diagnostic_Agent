# RAG Diagnostic Agent — central configuration

dataset:
  train_dir: dataset/processed/train
  val_dir: dataset/processed/val
  test_dir: dataset/processed/test
  num_classes: 15
  image_size: 224
  use_weighted_sampler: true

model:
  architecture: efficientnet_b2
  pretrained: true
  freeze_epochs: 5
  classifier_dropout: 0.3
  classifier_in_features: 1408

training:
  epochs: 30
  batch_size: 32
  lr: 0.0003
  weight_decay: 0.0001
  patience: 5
  seed: 42

artifacts:
  dir: artifacts
  best_model: artifacts/best_model.pt
  last_model: artifacts/last_model.pt
  history: artifacts/history.json
  confusion_matrix: artifacts/confusion_matrix.png

rag:
  knowledge_base_dir: knowledge_base
  chroma_db_dir: artifacts/chroma_db
  embedding_model: all-MiniLM-L6-v2
  top_k: 3
  confidence_threshold: 0.65

mlflow:
  experiment_name: plant_disease_classifier
  tracking_uri: mlruns
  run_name: null

classes:
  - Pepper__bell___Bacterial_spot
  - Pepper__bell___healthy
  - Potato___Early_blight
  - Potato___Late_blight
  - Potato___healthy
  - Tomato_Bacterial_spot
  - Tomato_Early_blight
  - Tomato_Late_blight
  - Tomato_Leaf_Mold
  - Tomato_Septoria_leaf_spot
  - Tomato_Spider_mites_Two_spotted_spider_mite
  - Tomato__Target_Spot
  - Tomato__Tomato_YellowLeaf__Curl_Virus
  - Tomato__Tomato_mosaic_virus
  - Tomato_healthy
